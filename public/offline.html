<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Offline - AttendanceTracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #020617;
        color: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        background: #020617;
        border-radius: 1rem;
        padding: 2rem;
        max-width: 420px;
        width: 100%;
        box-shadow: 0 20px 40px rgba(15, 23, 42, 0.8);
        border: 1px solid rgba(55, 65, 81, 0.8);
      }
      h1 {
        font-size: 1.6rem;
        margin: 0 0 0.75rem;
      }
      p {
        margin: 0 0 1.5rem;
        color: #9ca3af;
        font-size: 0.95rem;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.4rem 0.75rem;
        border-radius: 999px;
        font-size: 0.78rem;
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid rgba(55, 65, 81, 0.9);
        color: #e5e7eb;
        margin-bottom: 0.75rem;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #f97316;
      }
      .hint {
        font-size: 0.8rem;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="pill">
        <span class="dot"></span>
        Offline mode
      </div>
      <h1>You're offline right now</h1>
      <p>
        AttendanceTracker needs an internet connection for login and syncing
        attendance data. Any pages you visited recently may still be available
        and will update when you reconnect.
      </p>
      <p class="hint">Check your connection and try again.</p>
    </main>
  </body>
</html>
